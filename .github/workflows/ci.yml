name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked
      - run: cargo install tauri-cli --version '^2' --locked
      - run: cargo tauri build --bundles nsis
      - shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File ./scripts/write-checksums.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-installer
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sha256

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-cyclonedx
      - run: cargo cyclonedx --format json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: src-tauri/*.cdx.json
