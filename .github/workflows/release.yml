name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File ./scripts/assert-release-config.ps1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked
      - run: cargo install tauri-cli --version '^2' --locked
      - run: cargo tauri build --bundles nsis
      - shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File ./scripts/write-checksums.ps1
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sha256
